services:
  db:
    image: postgres:16-alpine
    container_name: gegarap_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gegarap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gegarap_secret}
      POSTGRES_DB: ${POSTGRES_DB:-gegarap_db}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - gegarap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gegarap} -d ${POSTGRES_DB:-gegarap_db}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  gegarap_pgdata:
    name: gegarap_pgdata
